<div class="table-responsive">
  <table class="table table-striped nzpc-table align-middle">
    <thead>
      <tr>
        <th scope="col">Category</th>
        <th scope="col">Description</th>
        <th scope="col">Typical Fee</th>
      </tr>
    </thead>
    <tbody>
      {{ range site.Data.categories }}
      <tr>
        <td>{{ .name }}</td>
        <td>{{ .description }}</td>
        <td>${{ .fee }}</td>
      </tr>
      {{ end }}
    </tbody>
  </table>
</div>
